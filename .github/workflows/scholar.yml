name: Update Publications

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: Fetch from Semantic Scholar
      run: |
        python3 - <<'EOF'
        import urllib.request, json

        AUTHOR_ID = "${{ vars.SEMANTIC_SCHOLAR_ID }}"
        RECORD_FILE = "${{ vars.RECORD_FILE }}"

        url = f"https://api.semanticscholar.org/graph/v1/author/{AUTHOR_ID}/papers?fields=title,authors,year,venue,citationCount,externalIds&limit=100"
        with urllib.request.urlopen(url) as r:
            data = json.load(r)

        papers = data.get("data", [])
        with open(RECORD_FILE, "w") as f:
            json.dump(papers, f, indent=2)

        print(f"Wrote {len(papers)} papers to {RECORD_FILE}")
        EOF

    - name: Commit if changed
      run: |
        git config --global user.name '${{ vars.GIT_USERNAME }}'
        git config --global user.email '${{ vars.GIT_EMAIL }}'
        git add ${{ vars.RECORD_FILE }}
        if ! git diff --staged --quiet; then
          git commit -m "Automatically update publications."
          git push
        else
          echo "No changes to commit."
        fi